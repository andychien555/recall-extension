<!DOCTYPE html>
<html>
<head>
  <title>Generate Recall Icons</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      background: #f5f5f5;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 { margin-top: 0; color: #333; }
    .icons {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .icon-item {
      text-align: center;
    }
    canvas {
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      margin-top: 8px;
      padding: 8px 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #5a6fd6;
    }
    .instructions {
      margin-top: 20px;
      padding: 15px;
      background: #f0f7ff;
      border-radius: 8px;
      font-size: 14px;
    }
    code {
      background: #e8e8e8;
      padding: 2px 6px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Recall Icon Generator</h1>
    <p>點擊下方按鈕下載各尺寸的 icon 檔案</p>

    <div class="icons" id="icons"></div>

    <div class="instructions">
      <strong>使用說明：</strong>
      <ol>
        <li>點擊各尺寸的「下載」按鈕</li>
        <li>將下載的檔案放到 <code>icons/</code> 資料夾</li>
        <li>確保檔名為 <code>icon16.png</code>、<code>icon48.png</code>、<code>icon128.png</code></li>
      </ol>
    </div>
  </div>

  <script>
    const sizes = [16, 48, 128];
    const container = document.getElementById('icons');

    sizes.forEach(size => {
      const div = document.createElement('div');
      div.className = 'icon-item';

      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Draw gradient background
      const gradient = ctx.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, '#667eea');
      gradient.addColorStop(1, '#764ba2');

      // Rounded rectangle
      const radius = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(radius, 0);
      ctx.lineTo(size - radius, 0);
      ctx.quadraticCurveTo(size, 0, size, radius);
      ctx.lineTo(size, size - radius);
      ctx.quadraticCurveTo(size, size, size - radius, size);
      ctx.lineTo(radius, size);
      ctx.quadraticCurveTo(0, size, 0, size - radius);
      ctx.lineTo(0, radius);
      ctx.quadraticCurveTo(0, 0, radius, 0);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw "R" letter
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${size * 0.55}px system-ui, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('R', size / 2, size / 2 + size * 0.03);

      const btn = document.createElement('button');
      btn.textContent = `下載 ${size}x${size}`;
      btn.onclick = () => {
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      div.appendChild(canvas);
      div.appendChild(document.createElement('br'));
      div.appendChild(btn);
      container.appendChild(div);
    });
  </script>
</body>
</html>
