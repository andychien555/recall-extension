<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recall</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 240px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff;
      color: #333;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .logo {
      width: 32px;
      height: 32px;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
      color: #0095f6;
    }

    .stats {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      color: #fff;
    }

    .count {
      font-size: 36px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .label {
      font-size: 13px;
      opacity: 0.9;
    }

    .footer {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #999;
      text-align: center;
    }

    .folder-path {
      display: block;
      margin-top: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 10px;
      color: #666;
      word-break: break-all;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #1a1a1a;
        color: #fff;
      }

      .footer {
        border-top-color: #333;
        color: #666;
      }

      .folder-path {
        color: #888;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <svg class="logo" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="8" fill="url(#grad)"/>
      <path d="M9 22V10h6l4 6-4 6H9z" fill="#fff"/>
      <path d="M17 22V10h6v12h-6z" fill="#fff" opacity="0.7"/>
      <defs>
        <linearGradient id="grad" x1="0" y1="0" x2="32" y2="32">
          <stop offset="0%" stop-color="#667eea"/>
          <stop offset="100%" stop-color="#764ba2"/>
        </linearGradient>
      </defs>
    </svg>
    <span class="title">Recall</span>
  </div>

  <div class="stats">
    <div class="count" id="count">0</div>
    <div class="label">篇文章已儲存</div>
  </div>

  <div class="footer">
    檔案儲存於
    <span class="folder-path">~/Downloads/bookmarks/</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
